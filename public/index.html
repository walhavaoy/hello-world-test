<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tmpclaw</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 40rem;
      margin: 2rem auto;
      padding: 0 1rem;
      color: var(--text, #1a1a1a);
      background: var(--bg, #fafafa);
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      border: 1px solid var(--border, #666);
      border-radius: 0.25rem;
      background: var(--btn-bg, #fff);
      color: var(--btn-text, #1a1a1a);
    }
    button:hover {
      background: var(--btn-hover, #eee);
    }
    #greeting-output {
      margin-top: 1rem;
      font-size: 1.25rem;
      min-height: 1.5rem;
    }
    #time-display {
      font-size: 1.125rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <h1 data-testid="heading">tmpclaw</h1>
  <div data-testid="time-display" id="time-display"></div>
  <button data-testid="greeting-button" data-action="fetch-greeting">Get Greeting</button>
  <div data-testid="greeting-output" id="greeting-output"></div>

  <script>
    (function () {
      var timeEl = document.getElementById("time-display");
      var outputEl = document.getElementById("greeting-output");

      function updateTime() {
        timeEl.textContent = new Date().toLocaleTimeString();
      }
      updateTime();
      setInterval(updateTime, 1000);

      document.addEventListener("click", function (e) {
        if (e.target.getAttribute("data-action") === "fetch-greeting") {
          fetch("/api/greeting")
            .then(function (res) {
              if (!res.ok) throw new Error("Request failed");
              return res.json();
            })
            .then(function (data) {
              outputEl.textContent = data.greeting;
            })
            .catch(function (err) {
              outputEl.textContent = "Error fetching greeting";
            });
        }
      });
    })();
  </script>
</body>
</html>
